dataset:
  name: "sars_cov2_variants"
  path: "datasets/sars_cov2.csv"
  categorical_columns: ["variant", "country", "mutation_type"]
  numeric_columns: ["viral_load", "patient_age", "days_since_outbreak"]
  value_filter : ["."] # Remove Rows containing this value(s)
  bootstrapmultiplier : 0 
  # 0 = deactivated (original dataset), 1 = same size as original but with weighted draw, 2 double size weighted, ...

generator_architecture:
  noise_dim: 128
  layers: [256, 512, 256] 
  activation: "leaky_relu"

discriminator_architecture:
  layers: [256, 512, 256] 
  activation: "leaky_relu"

training:
  epochs: 1000
  batch_size: 512
  lr_gen: 0.0002
  lr_disc: 0.0001
  beta1: 0.5
  use_wasserstein: true
  export_generator : true
  exported_generator_filename : &VAR "exported_models/generator_sars_cov2.pth"

datageneration:
  use_existing_model : false  # if you just want to create data from a pretrained generator 
  modelfile : *VAR
  export : true
  size : 500
  filename: "datasets/generated/sars_cov2_fake.csv"