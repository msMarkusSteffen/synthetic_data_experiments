dataset:
  name: "sars_cov2_variants"
  path: "datasets/sars_cov2.csv"
  categorical_columns: ["variant", "country", "mutation_type"]
  numeric_columns: ["viral_load", "patient_age", "days_since_outbreak"]

model_architecture:
  noise_dim: 128
  hidden_dim: 256
  generator_layers: [256, 512, 256] # Dynamische Tiefe!
  activation: "leaky_relu"

training:
  epochs: 1000
  batch_size: 512
  lr_gen: 0.0002
  lr_disc: 0.0001
  beta1: 0.5
  use_wasserstein: true